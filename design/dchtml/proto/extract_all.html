<!DOCTYPE html>
<html>
<!-- Roguebane — EXTRACTION HARNESS (persistent tooling, not a design).
     Renders every screen dc.html in a hidden same-origin iframe, runs proto/screen_extract.js
     INSIDE each frame (LAYOUT_CONTRACT §9: extract in the same render that screenshots), and emits
     the combined {screens, templates, style} as chunked console.log lines (RBX|i|<chunk> … RBXEND|n)
     for the merge step to reassemble into Content/layout.json. -->
<head><meta charset="utf-8"><title>RB extract</title></head>
<body style="margin:0;background:#000;color:#0f0;font:12px monospace;">
<div id="log" style="white-space:pre-wrap;padding:8px;"></div>
<script>
const SCREENS = ['Encounter', 'Equipment', 'CityMap', 'NewGame', 'CampaignMap', 'Merchant'];   // ALWAYS the FULL set (payload B1 2026-07-03 late: running a subset silently DROPPED screens.campaignmap + templates.cityNode from layout.json — the merge replaces those sections wholesale). extract_merge.js also key-set-diffs against the previous manifest as a backstop.
const put = m => { document.getElementById('log').textContent += m + '\n'; };

async function srcText(p) { return (await fetch(p)).text(); }

function extractOne(file, styleSrc, extractSrc) {
  return new Promise((resolve, reject) => {
    const f = document.createElement('iframe');
    f.style.cssText = 'width:1920px;height:1200px;border:0;position:absolute;left:0;top:0;visibility:hidden;';
    f.src = '../' + file + '.dc.html';
    const t0 = Date.now();
    f.onload = () => {
      const poll = setInterval(() => {
        let ready = false;
        try {
          const d = f.contentDocument, w = f.contentWindow;
          const root = d.querySelector('[data-screen]');
          // ready = root present, templates instantiated, fonts loaded, and the async
          // attribute-model screens have real pip rows (no empty data-container)
          if (root) {
            const containers = root.querySelectorAll('[data-container]');
            let filled = true;
            containers.forEach(c => { const tn = c.getAttribute('data-template'); if (tn && !c.querySelector('[data-tpl="' + tn + '"]')) filled = false; });
            // a container whose sample content is static markup (e.g. Equipment's empty minion slot)
            // never instantiates its template — proceed anyway after a grace period
            ready = (filled || Date.now() - t0 > 8000) && d.fonts.status === 'loaded' && (Date.now() - t0 > 2500);
          }
          if (ready) {
            clearInterval(poll);
            w.eval(styleSrc);
            w.eval(extractSrc);
            const res = w.RB_extractScreen(d.querySelector('[data-screen]'), w.RB_STYLE);
            f.remove();
            resolve(res);
          } else if (Date.now() - t0 > 20000) {
            clearInterval(poll); reject(new Error(file + ': timeout waiting for render'));
          }
        } catch (e) { clearInterval(poll); reject(e); }
      }, 250);
    };
    document.body.appendChild(f);
  });
}

(async () => {
  try {
    const styleSrc = await srcText('../style_tokens.js');
    const extractSrc = await srcText('../proto/screen_extract.js');
    (0, eval)(styleSrc); (0, eval)(extractSrc);   // for RB_styleBlock here
    const out = { screens: {}, templates: {}, style: RB_styleBlock(RB_STYLE) };
    for (const s of SCREENS) {
      put('extracting ' + s + ' …');
      const r = await extractOne(s, styleSrc, extractSrc);
      out.screens[r.id] = r.screen;
      Object.assign(out.templates, r.templates);
      put('  ✓ ' + r.id + ': ' + r.screen.elements.length + ' elements, ' + Object.keys(r.templates).length + ' templates');
    }
    const json = JSON.stringify(out);
    const CH = 3500;
    for (let i = 0; i < json.length; i += CH) console.log('RBX|' + (i / CH | 0) + '|' + json.slice(i, i + CH));
    console.log('RBXEND|' + Math.ceil(json.length / CH) + '|' + json.length);
    put('DONE — ' + json.length + ' chars in ' + Math.ceil(json.length / CH) + ' chunks (see console)');
    window.__rbExtract = json;
    put('PNG channel ready: ' + RB_pngChannelInit(json) + ' segments (call RB_pngChannelDraw(k) per screenshot step)');
  } catch (e) {
    put('FAILED: ' + (e && e.message));
    console.log('RBXFAIL|' + (e && e.message));
  }
})();

// ---- PNG DATA CHANNEL (2026-07-03: get_webview_logs truncates long console lines, so the chunked
// console.log path above is LOSSY for agent-side reads — kept for human inspection only). The
// extract JSON is instead rendered as grey 4×4 blocks (one hex NIBBLE per block, value = nibble*17 —
// 16 levels tolerate ±8 resample/color-shift error) onto a 896×504 canvas, one SEGMENT per
// screenshot step, captured via save_screenshot in_memory_png_key and decoded+merged into
// Content/layout.json by proto/extract_merge.js in run_script. Zero data through the console.
var RB_PNGCH = { B: 4, W: 896, H: 504, bytes: null };
function RB_pngChannelInit(json) {
  RB_PNGCH.bytes = new TextEncoder().encode(json);
  var bpr = RB_PNGCH.W / RB_PNGCH.B, rows = RB_PNGCH.H / RB_PNGCH.B;
  RB_PNGCH.perSeg = (bpr * rows - 16) / 2;   // 16 header blocks = 8 header bytes
  return Math.ceil(RB_PNGCH.bytes.length / RB_PNGCH.perSeg);
}
function RB_pngChannelDraw(k) {
  var C = RB_PNGCH, bpr = C.W / C.B;
  if (!C.bytes) {
    if (!window.__rbExtract) throw new Error('extraction not finished yet — wait before drawing segments');
    RB_pngChannelInit(window.__rbExtract);   // self-init (a fresh page load re-runs extraction)
  }
  var cv = document.getElementById('__rbpng');
  if (!cv) {
    document.body.style.cssText = 'margin:0;padding:0;background:#000;';
    Array.prototype.forEach.call(document.body.children, function (n) { n.style.display = 'none'; });
    cv = document.createElement('canvas'); cv.id = '__rbpng';
    cv.width = C.W; cv.height = C.H;
    cv.style.cssText = 'display:block;position:absolute;left:0;top:0;image-rendering:pixelated;';
    document.body.appendChild(cv);
  }
  var total = C.bytes.length, segN = Math.ceil(total / C.perSeg);
  var off = k * C.perSeg, segLen = Math.max(0, Math.min(C.perSeg, total - off));
  // header 8 bytes: A5, segIdx, total(4 BE), segLen(2 BE)
  var head = [0xA5, k, (total >>> 24) & 255, (total >>> 16) & 255, (total >>> 8) & 255, total & 255, (segLen >> 8) & 255, segLen & 255];
  var x = cv.getContext('2d');
  x.fillStyle = '#000'; x.fillRect(0, 0, C.W, C.H);
  function blk(i, nib) { var bx = i % bpr, by = (i / bpr) | 0, v = nib * 17; x.fillStyle = 'rgb(' + v + ',' + v + ',' + v + ')'; x.fillRect(bx * C.B, by * C.B, C.B, C.B); }
  for (var h = 0; h < 8; h++) { blk(h * 2, head[h] >> 4); blk(h * 2 + 1, head[h] & 15); }
  for (var i = 0; i < segLen; i++) { var b = C.bytes[off + i]; blk(16 + i * 2, b >> 4); blk(16 + i * 2 + 1, b & 15); }
  return 'seg ' + k + '/' + segN + ' bytes ' + segLen;
}
</script>
</body>
</html>
